name: YouTube統計の自動更新

on:
  schedule:
    - cron: '0 21 * * *'  # 毎日UTC21時 = 日本時間 朝6時
  workflow_dispatch: {}  # 手動実行用

permissions:
  contents: write  # main ブランチへコミット・pushするために必要

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト 🛎️
        uses: actions/checkout@v4

      - name: YouTube APIから最新の統計情報を取得 📊
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          CHANNEL_ID: UCerBISByAKR3KU9CD9Tz5ZQ
        run: |
          set -euo pipefail

          # APIキーには「HTTPリファラー制限」がかかっているため、許可済みドメインを
          # Refererヘッダーとして送信する（自サイト用キーを自サイトの自動処理から使うための設定）。
          # 1回目: 本番ドメイン → 403なら 2回目: GitHub Pagesドメイン でリトライ。
          # APIキーをURLに直接埋め込まず、curlに変数経由で渡すことでログへの露出を防ぐ。
          fetch_stats() {
            local referer="$1"
            curl -s -o response.json -w "%{http_code}" \
              -H "Referer: ${referer}" \
              --get "https://www.googleapis.com/youtube/v3/channels" \
              --data-urlencode "part=statistics" \
              --data-urlencode "id=${CHANNEL_ID}" \
              --data-urlencode "key=${YOUTUBE_API_KEY}"
          }

          http_status=$(fetch_stats "https://shigin-portal.com/")
          echo "YouTube API HTTPステータス（Referer: shigin-portal.com）: ${http_status}"

          if [ "${http_status}" = "403" ]; then
            echo "403のため、別のRefererでリトライします。"
            http_status=$(fetch_stats "https://heyhey3011.github.io/")
            echo "YouTube API HTTPステータス（Referer: heyhey3011.github.io）: ${http_status}"
          fi

          if [ "${http_status}" != "200" ]; then
            echo "::error::YouTube APIの呼び出しに失敗しました（HTTP ${http_status}）。前回の値を維持します。"
            cat response.json || true
            exit 1
          fi

          subscriber_count=$(jq -r '.items[0].statistics.subscriberCount // empty' response.json)
          video_count=$(jq -r '.items[0].statistics.videoCount // empty' response.json)

          echo "取得した subscriberCount: ${subscriber_count}"
          echo "取得した videoCount: ${video_count}"

          # 値が空・0・非数値の場合はファイルを書き換えずに失敗させる（壊れた値で上書きしない）
          if [ -z "${subscriber_count}" ] || [ -z "${video_count}" ]; then
            echo "::error::統計情報の取得に失敗しました（値が空です）。前回の値を維持します。"
            exit 1
          fi

          if ! [[ "${subscriber_count}" =~ ^[0-9]+$ ]] || ! [[ "${video_count}" =~ ^[0-9]+$ ]]; then
            echo "::error::統計情報が数値ではありません。前回の値を維持します。"
            exit 1
          fi

          if [ "${subscriber_count}" -eq 0 ] || [ "${video_count}" -eq 0 ]; then
            echo "::error::統計情報が0のため異常値と判断し、前回の値を維持します。"
            exit 1
          fi

          updated_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          jq -n \
            --argjson subscriberCount "${subscriber_count}" \
            --argjson videoCount "${video_count}" \
            --arg updatedAt "${updated_at}" \
            '{subscriberCount: $subscriberCount, videoCount: $videoCount, updatedAt: $updatedAt}' \
            > assets/data/youtube-stats.json

          echo "assets/data/youtube-stats.json を更新しました。"
          cat assets/data/youtube-stats.json

          # 後続ステップに一時ファイルを残さない
          rm -f response.json

      - name: 変更をコミットしてpush 🚀
        id: commit_push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- assets/data/youtube-stats.json; then
            echo "変更がないため、コミットとデプロイをスキップします。"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add assets/data/youtube-stats.json
          git commit -m "chore: YouTube統計情報を自動更新"
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # ---- ここから両サイトへのデプロイ ----
      # GITHUB_TOKENによるbotのpushは、再帰防止のため他のワークフロー（deploy.yml /
      # deploy-cloudflare.yml）をトリガーしない。そのため、値に変更があった場合は
      # この同じワークフロー内で両方のデプロイを直接実行する。
      # 通常の（人間の）pushでは従来通り既存の2つのデプロイワークフローが動く。
      #
      # 順序に注意: peaceiris/actions-gh-pages はワークスペースの .git を壊すため、
      # git を必要とする処理（git archive）を先に済ませ、GitHub Pagesデプロイは最後に回す。

      # --- Cloudflare Pages（deploy-cloudflare.yml と同じ手順） ---
      # git archive は統計コミット後のHEAD（コミット済みツリー）を使うため、
      # プレースホルダーのconfig.jsのまま配信される（実キーは含まれない）
      - name: 追跡ファイルのみのクリーンなコピーを作成（Cloudflare用） 🧹
        if: steps.commit_push.outputs.changed == 'true'
        run: |
          mkdir -p dist
          git archive HEAD | tar -x -C dist

      - name: Cloudflare Pagesへデプロイ 🚀
        if: steps.commit_push.outputs.changed == 'true'
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=heyhey-shigin-portal --branch=main

      # dist はCloudflareへアップロード済みのため削除する。
      # 残したままだと、次のGitHub Pagesデプロイ（publish_dir: ./）に混入してしまう。
      # リポジトリの追跡ファイルには触れない。
      - name: distをクリーンアップ 🧹
        if: steps.commit_push.outputs.changed == 'true'
        run: rm -rf dist

      # --- GitHub Pages（deploy.yml と同じ手順） ---
      # peaceiris は .git を破壊するため必ず最後に実行する
      - name: config.jsをSecretから生成（GitHub Pages用） 🔑
        if: steps.commit_push.outputs.changed == 'true'
        run: |
          # config.jsを直接生成する方法で安定性を向上
          cat <<EOF > config.js
          const CONFIG = {
              YOUTUBE: {
                  API_KEY: '${{ secrets.YOUTUBE_API_KEY }}',
                  CHANNEL_ID: 'UCerBISByAKR3KU9CD9Tz5ZQ',
                  PICKUP_LIST_1_IDS: ['IwBnAvPYRh0', 'DQA-R_DkEhU', '1xL8CaRDU_Q', 'asWq0vICQ-Q'],
                  PICKUP_LIST_2_IDS: ['YIuOy8K5GzY', 'dCA1KRYJKHU', 'ZDSFoBrDqUU', 'BG5kIRN7rns']
              },
              SECURITY: {
                  FALLBACK_SUBSCRIBER_COUNT: 3600,
                  FALLBACK_VIDEO_COUNT: 900
              }
          };
          Object.freeze(CONFIG);
          Object.freeze(CONFIG.YOUTUBE);
          Object.freeze(CONFIG.SECURITY);
          EOF
          echo "config.js has been generated successfully."

      - name: GitHub Pagesへデプロイ 🚀
        if: steps.commit_push.outputs.changed == 'true'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
